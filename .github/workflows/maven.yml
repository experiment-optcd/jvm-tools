
name: Modified CI build
jobs:
  build8:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 8
      uses: actions/setup-java@v2
      with:
        java-version: '8'
        distribution: adopt
    - name: Build with Maven
      run: mvn -B package --file pom.xml -DdisableToolchain
    name: build8
  build11:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: adopt
    - name: Build with Maven
      run: mvn -B package --file pom.xml -DdisableToolchain
    name: build11
  build15:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 15
      uses: actions/setup-java@v2
      with:
        java-version: '15'
        distribution: adopt
    - name: Build with Maven
      run: mvn -B help:active-profiles && mvn -B package --file pom.xml -DdisableToolchain
    name: build15
  build17:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 17
      uses: actions/setup-java@v2
      with:
        java-version: '17'
        distribution: adopt
    - name: Build with Maven
      run: mvn -B help:active-profiles && mvn -B package --file pom.xml -DdisableToolchain
    name: build17
  build21:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 21
      uses: actions/setup-java@v2
      with:
        java-version: '21'
        distribution: adopt
    - name: Build with Maven
      run: mvn -B help:active-profiles && mvn -B package --file pom.xml -DdisableToolchain
    name: build21
'on':
- push
- workflow_dispatch
